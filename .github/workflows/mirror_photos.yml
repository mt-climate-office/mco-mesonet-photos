name: Mirror Mesonet Photos

on:
  schedule:
    - cron: "0 15 * * *"    # 9:00 AM MDT (UTC-6)
    - cron: "15 15 * * *"   # 9:15 AM MDT (UTC-6)
    - cron: "30 15 * * *"   # 9:30 AM MDT (UTC-6)
    - cron: "45 15 * * *"   # 9:45 AM MDT (UTC-6)
    - cron: "0 16 * * *"    # 10:00 AM MDT (UTC-6)
    - cron: "0 17 * * *"    # 11:00 AM MDT (UTC-6)
    - cron: "0 21 * * *"    # 3:00 PM MDT (UTC-6)
    - cron: "15 21 * * *"   # 3:15 PM MDT (UTC-6)
    - cron: "30 21 * * *"   # 3:30 PM MDT (UTC-6)
    - cron: "45 21 * * *"   # 3:45 PM MDT (UTC-6)
    - cron: "0 22 * * *"    # 4:00 PM MDT (UTC-6)
    - cron: "0 23 * * *"    # 5:00 PM MDT (UTC-6)
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install cwebp
        run: sudo apt-get install -y webp

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Mirror photos
        run: python scripts/mirror_photos.py

      - name: Invalidate CloudFront manifest cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/photos/manifest.parquet"

  preview:
    name: Update social preview image
    needs: mirror
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit docs/preview.png back to the repo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Generate preview image
        run: python scripts/generate_preview.py

      - name: Commit preview image
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/preview.png
          git diff --staged --quiet || git commit -m "chore: update social preview image [skip ci]"
          git push
